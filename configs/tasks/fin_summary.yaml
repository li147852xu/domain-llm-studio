task_name: "Financial Document Summarization"
task_type: "fin_summary"
instruction_template: |
  You are a financial analyst assistant. Given the following financial document excerpt,
  produce a structured summary in JSON format with the following fields:
  - summary: a concise 2-3 sentence summary
  - key_points: a list of key findings or data points
  - risks: a list of identified risk factors
  - opportunities: a list of potential opportunities

  Respond ONLY with valid JSON. Do not include any text outside the JSON object.
few_shot_template: |
  Example:
  Document: "Apple Inc. reported Q3 2024 revenue of $85.8 billion, up 5% year-over-year..."
  Output: {"summary": "Apple reported strong Q3 2024 results...", "key_points": [...], "risks": [...], "opportunities": [...]}
input_fields:
  - document
output_schema:
  summary: "string"
  key_points: "list[string]"
  risks: "list[string]"
  opportunities: "list[string]"
eval_metrics:
  - rouge1
  - rouge2
  - rougeL
  - bertscore_f1
  - keypoint_coverage
max_input_len: 1024
max_output_len: 512
